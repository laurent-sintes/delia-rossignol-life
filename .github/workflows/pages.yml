name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and quality tools
        run: python -m pip install -e ".[dev]" -c requirements/constraints.txt

      - name: Verify resolved dependencies
        run: python -m pip check

      - name: Lint
        run: python -m ruff check src scripts tests

      - name: Type check
        run: python -m mypy

      - name: Validate project skills
        run: python scripts/validate_skills.py

      - name: Build deterministic documents
        run: python scripts/delia_life.py build-documents

      - name: Test with branch coverage
        run: |
          python -m coverage run -m unittest discover -s tests -v
          python -m coverage report

      - name: Validate all project contracts
        run: python scripts/delia_life.py check

      - name: Validate generated documents
        run: python scripts/delia_life.py check-documents

  windows-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install -e ".[dev]" -c requirements/constraints.txt

      - name: Verify Windows staging cleanup
        run: >-
          python -m unittest
          tests.test_core.CoreTests.test_remove_tree_clears_readonly_generated_directories
          tests.test_site.SiteTests.test_repeated_builds_leave_no_staging_directory
          -v

  build:
    runs-on: ubuntu-latest
    needs: [quality, windows-smoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project
        run: python -m pip install -e . -c requirements/constraints.txt

      - name: Build allowlisted site
        run: python scripts/delia_life.py build-site --output _site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

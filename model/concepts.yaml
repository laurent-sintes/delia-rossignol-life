concepts:
  - id: person
    label: Personne
    kind: entity
    description: Sujet du dossier professionnel; actuellement Délia Rossignol.
    privacy: mixed
    storage: data/knowledge/profile.json
    key_attributes: [identity, headline, preferences, privacy_defaults]

  - id: contact-point
    label: Coordonnée
    kind: value_object
    description: Moyen de contact personnel ou professionnel, daté et qualifié par son usage; sa visibilité dans Pages et les documents est privée par défaut, même si la donnée est versionnée.
    privacy: mixed
    storage: private/knowledge/contact-points
    key_attributes: [kind, value, label, usage, valid_from, valid_to, visibility]

  - id: career-project
    label: Projet professionnel
    kind: entity
    description: Expression versionnée de ce que Délia recherche, accepte, préfère ou exclut dans sa prochaine activité; exclue de Pages par défaut.
    privacy: private
    storage: private/career-project
    key_attributes: [name, status, valid_from, valid_to, availability, notes]

  - id: industry-sector
    label: Secteur d'activité
    kind: entity
    description: Secteur économique normalisé utilisé pour qualifier organisations, expériences, offres et cibles professionnelles.
    privacy: public
    storage: data/knowledge/reference/industry-sector
    key_attributes: [name, code, classification, parent_id, aliases, source_label]

  - id: job-role
    label: Type de poste
    kind: entity
    description: Fonction ou famille de métiers normalisée, indépendante du titre exact employé dans une source ou une offre.
    privacy: public
    storage: data/knowledge/reference/job-role
    key_attributes: [name, job_family, seniority, aliases, description, source_label]

  - id: location
    label: Lieu
    kind: entity
    description: Zone géographique normalisée utilisable pour une activité, une offre, un établissement ou un critère de mobilité.
    privacy: public
    storage: data/knowledge/reference/location
    key_attributes: [name, kind, country, postal_code, latitude, longitude, source_label]

  - id: search-criterion
    label: Critère de recherche
    kind: value_object
    description: Préférence ou contrainte comparable à une offre, portant notamment sur le secteur, le poste, le contrat, le lieu, le rythme, la rémunération ou l'environnement.
    privacy: private
    storage: embedded:career-project.criteria
    key_attributes: [dimension, operator, value, priority, hard_constraint, rationale, valid_from, valid_to]

  - id: achievement
    label: Réalisation
    kind: entity
    description: Résultat ou accomplissement rattaché à une expérience, éventuellement mesuré et distingué entre fait et déclaration.
    privacy: mixed
    storage: data/knowledge/entities/achievement
    key_attributes: [statement, metric_name, metric_value, metric_unit, context, classification]

  - id: language-proficiency
    label: Maîtrise linguistique
    kind: value_object
    description: Niveau de langue structuré par dimension afin de ne pas réduire l'oral, l'écrit et la lecture à une note unique.
    privacy: public
    storage: data/knowledge/language-proficiencies
    key_attributes: [language, speaking_level, writing_level, reading_level, framework, self_assessed]

  - id: interest
    label: Centre d'intérêt
    kind: entity
    description: Activité ou sujet d'intérêt personnel publiable uniquement après validation de sa pertinence professionnelle.
    privacy: mixed
    storage: data/knowledge/interests
    key_attributes: [name, category, description, visibility]

  - id: organization
    label: Organisation
    kind: entity
    description: Entreprise employeuse, cliente, créée par Délia ou émettrice d'une offre.
    privacy: public
    storage: data/knowledge/entities/organization
    key_attributes: [name, organization_type, activity, location, former_names]

  - id: source
    label: Source
    kind: artifact
    description: Document, page, note ou retour à l'origine d'une information proposée.
    privacy: private
    storage: private/originals et data/sources/manifests
    key_attributes: [kind, original_uri, sha256, source_date, effective_date, ingested_at]

  - id: website-archive
    label: Archive de site
    kind: artifact
    description: Capture bornée et datée d'un site, de ses pages et de ses ressources visuelles utiles.
    privacy: private
    storage: private/website-archives
    key_attributes: [start_url, captured_at, records, truncated]

  - id: evidence
    label: Preuve
    kind: value_object
    description: Extrait ou élément visuel localisable qui justifie une proposition.
    privacy: mixed
    storage: embedded:knowledge-proposal.source
    key_attributes: [source_id, locator, excerpt]

  - id: ingestion
    label: Ingestion
    kind: process
    description: Traitement d'une ou plusieurs sources pour produire des propositions sans modifier la connaissance.
    privacy: private
    storage: runtime
    key_attributes: [started_at, adapter, source_ids]

  - id: knowledge-proposal
    label: Proposition de connaissance
    kind: entity
    description: Valeur atomique proposée, qualifiée et en attente d'une décision humaine.
    privacy: private
    storage: data/review/queue
    key_attributes: [target, proposed_value, classification, confidence, status]

  - id: validation-decision
    label: Décision de validation
    kind: event
    description: Acceptation, édition, rejet ou réouverture d'une proposition par un humain identifié.
    privacy: private
    storage: embedded:knowledge-proposal.history
    key_attributes: [reviewer, from, to, note, at]

  - id: knowledge-fact
    label: Fait validé
    kind: entity
    description: Valeur appliquée à une entité de connaissance avec son historique de provenance.
    privacy: mixed
    storage: data/knowledge/entities
    key_attributes: [entity_type, entity_id, field, value, classification, sensitivity, visibility, valid_from, valid_to, provenance]

  - id: skill
    label: Compétence
    kind: entity
    description: Capacité démontrée ou connaissance détenue par la personne, avec preuves et niveau qualifié.
    privacy: public
    storage: data/knowledge/skills.json
    key_attributes: [name, category, level, proficiency_dimensions, summary]

  - id: experience
    label: Expérience
    kind: entity
    description: Période d'activité professionnelle, entrepreneuriale, associative ou de mission, décrite par une mission explicite et sourcée.
    privacy: public
    storage: data/knowledge/entities/experience
    key_attributes: [title, engagement_type, organization, location, start_date, start_precision, end_date, end_precision, ongoing, mission, responsibilities, outcomes, job_role_ids, previous_experience_id]

  - id: education
    label: Formation
    kind: entity
    description: Parcours d'apprentissage formel ou qualifiant suivi par la personne.
    privacy: public
    storage: data/knowledge/entities/education
    key_attributes: [institution, program, completion_status, location, start_date, end_date]

  - id: credential
    label: Diplôme ou certification
    kind: entity
    description: Titre, diplôme, certification ou attestation obtenu et vérifiable.
    privacy: mixed
    storage: data/knowledge/entities/credential
    key_attributes: [name, issuer, awarded_at, identifier]

  - id: style-profile
    label: Profil stylistique
    kind: entity
    description: Ton, préférences visuelles et posture professionnelle validés pour Délia.
    privacy: public
    storage: data/style/delia.json
    key_attributes: [tone, colors, preferred_elements, forbidden_elements, visual_positioning]

  - id: professional-posture
    label: Approche professionnelle
    kind: entity
    description: Principes de travail exprimés, posture professionnelle validée et repères réutilisables pour répondre personnellement à une offre.
    privacy: public
    storage: data/knowledge/entities/professional-posture
    key_attributes: [site_claims, validated_inferences]

  - id: job-offer
    label: Offre d'emploi
    kind: entity
    description: Opportunité structurée avec contexte, exigences obligatoires et préférences employeur.
    privacy: private
    storage: data/offers
    key_attributes: [employer, role, sectors, location, contract_type, work_mode, schedule, compensation, required_skills, preferred_skills, source_url]

  - id: match-assessment
    label: Évaluation de rapprochement
    kind: assessment
    description: Comparaison explicable entre une offre et les connaissances validées de la personne.
    privacy: private
    storage: embedded:job-offer.assessment
    key_attributes: [method, score, matches, gaps, criterion_results, hard_constraint_failures]

  - id: document-template
    label: Template documentaire
    kind: artifact
    description: Modèle sans donnée personnelle décrivant rendu, usages, contraintes ATS et formats.
    privacy: public
    storage: templates
    key_attributes: [id, version, ats_compatible, sectors, roles, formats]

  - id: application-document
    label: Document de candidature
    kind: artifact
    description: CV, lettre ou pièce générée pour une offre à partir de faits validés et d'un template.
    privacy: private
    storage: generated
    key_attributes: [kind, version, template_id, traceability]

  - id: application
    label: Candidature
    kind: entity
    description: Réponse de la personne à une offre, avec documents, état et chronologie.
    privacy: private
    storage: data/applications
    key_attributes: [offer_id, submitted_at, status, document_versions]

  - id: application-event
    label: Événement de candidature
    kind: event
    description: Changement chronologique tel qu'envoi, entretien, refus, offre ou retrait.
    privacy: private
    storage: embedded:application.events
    key_attributes: [type, occurred_at, details]

  - id: feedback
    label: Feedback
    kind: event
    description: Retour explicite ou observation collectée après une candidature.
    privacy: private
    storage: embedded:application.events
    key_attributes: [content, source, occurred_at, interpretation]

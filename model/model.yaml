model_version: "1.1.7"
namespace: delia-career
description: >-
  Modèle conceptuel du dossier professionnel, de l'ingestion des preuves,
  du projet professionnel recherché, de la préparation des candidatures et
  de leur boucle de feedback.

concept_files:
  - concepts.yaml

relation_files:
  - relations.yaml

invariants:
  - id: no-fabrication
    rule: Une connaissance ou un document de candidature ne peut pas introduire un fait sans preuve validée.
  - id: provenance-required
    rule: Toute proposition et tout fait validé conservent une provenance localisable.
  - id: human-validation-gate
    rule: Une ingestion produit des propositions; seule une décision humaine acceptée ou éditée autorise leur application.
  - id: fact-claim-inference-separation
    rule: Un fait, une déclaration commerciale et une inférence restent explicitement distingués.
  - id: content-presentation-separation
    rule: Les connaissances, la stratégie éditoriale et les templates de rendu sont indépendants.
  - id: feedback-is-observation
    rule: Un feedback produit une proposition d'amélioration et ne modifie jamais directement la connaissance.
  - id: public-projection-only
    rule: GitHub Pages ne contient qu'une projection explicitement publiable, même si le dépôt public versionne l'ensemble des données métier.
  - id: sensitive-private-by-default
    rule: Une coordonnée ou donnée personnelle sensible reste exclue de GitHub Pages et des documents produits tant qu'une décision humaine explicite n'autorise pas sa publication.
  - id: repository-is-complete
    rule: Les sources, archives, propositions, décisions, connaissances, offres, candidatures, feedbacks et productions métier sont versionnés afin qu'un clone du dépôt permette de poursuivre le travail.
  - id: technical-secrets-never-versioned
    rule: Les mots de passe, jetons, clés privées, cookies d'authentification et fichiers d'environnement ne sont jamais versionnés.
  - id: experience-mission-required
    rule: Toute expérience validée porte une mission explicite, courte et sourcée, qui exprime sa finalité ou sa contribution principale.
  - id: experience-responsibilities-required
    rule: Toute expérience validée porte une liste non vide de responsabilités explicites et sourcées; ne pas les déduire de la mission, du titre ou des résultats.
  - id: age-is-derived
    rule: Un âge est calculé à une date donnée depuis une date de naissance validée; il n'est jamais stocké comme fait permanent.
  - id: temporal-precision-preserved
    rule: Une date partielle ou une période en cours conserve sa précision d'origine; aucun jour ou mois n'est inventé.
  - id: hard-constraint-is-explicit
    rule: Un critère bloquant du projet professionnel et un obstacle de candidature sont évalués séparément du score; leur effet sur l'exclusion ou la section de recommandation est expliqué.
  - id: normalized-label-retains-source
    rule: Toute normalisation vers un secteur, un type de poste ou un lieu conserve le libellé source et sa preuve.

refactor_policy:
  compatibility: Conserver un identifiant ou déclarer explicitement son remplacement.
  migration: Toute suppression ou modification de cardinalité nécessite une migration déterministe.
  impact_check: Exécuter model-impact avant de modifier ou supprimer un concept.
  validation: Exécuter model-check, les tests et le build du site avant commit.

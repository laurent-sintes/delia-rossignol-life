    <meta name="title" property="og:title" content="Gestionnaire comptabilité générale - CDD (f/h)">
    <meta name="description" property="og:description" content="Tu es passionné de produits culturels...Mais aussi de Comptabilité... Nous avons un poste à te proposer en CDD ! Tes missions: Au sein de la Direction Financière, le service Comptabilité Générale recherche un nouveau collaborateur qui viendra apporter sa bonne humeur, son dynamisme et pourquoi pas nous faire découvrir un nouveau talent. Tes missions au quotidien : Tu es responsable d’un portefeuille de magasins et sera en relation avec des managers en magasin qui feront toujours preuve de créativité dans leurs réponses. Tu assures le contrôle et la comptabilisation des pièces comptables, les états de rapprochement bancaires, le suivi des opérations financières le tout au cœur d’une équipe soudée. Tu effectues les opérations de clôtures mensuelles toujours en lien avec les équipes terrains et surtout dans la bienveillance en apportant ton expertise. Tu contribues à l’amélioration des process du service, et oui on attend de toi plein de nouvelles idées ! Ton profil: #dynamisme #rigueur #autonomie #simplicité #curiosité #espritd’équipe Tu as une formation niveau Bac+2 en comptabilité. La comptabilité analytique n’a pas de secret pour toi ! Si tu connais le logiciel Sage X3, on sera ravis de te voir l’utiliser Les formules et les tableaux croisés dynamiques sur Excel sont des jeux d’enfants pour toi. Les horaires sont 08h30 - 16h30 mais on sait s’adapter et contrairement aux magasins on ne travaille pas le samedi. CDD à pourvoir dès que possible pour une durée de 6mois (temps plein 35h). Rémunération : 2250€ bruts mensuels. scultura1 Rémunération et avantages Ta rémunération est constituée d’un salaire fixe sur 12 mois (selon profil). A cela peut s’ajouter une partie variable comprenant : - Une prime d’intéressement trimestrielle, - Une prime de participation annuelle. La possibilité de télétravailler 2 jours par semaine. Des avantages comme des tickets restaurant, des remises sur tes achats en magasin et de l’emprunt de produits. De participer à des évènements culturels organisés en interne tout au long de l’année. Pour plus de détails, rendez-vous sur : https://recrutement.cultura.com/ Ce poste peut faire l&#39;objet d&#39;aménagements spécifiques en cas de handicap. Contrat : CDD (Temps plein) Temps de travail : 35 Magasins : MERIGNAC SIEGE SOCIAL (FR-33) Rémunération (brute annuelle) à partir de : 27000€ Bienvenue et merci pour l&#39;intérêt que tu portes à Cultura ! Cultura propose de nombreuses offres à pourvoir. Notre volonté est d&#39;embaucher des personnes passionnées et talentueuses. Une fois que tu auras eu l&#39;occasion d&#39;explorer l&#39;ensemble de nos opportunités, postule et suis directement la progression de ton processus de recrutement en ligne.">

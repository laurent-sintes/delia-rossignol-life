    <meta name="description" property="og:description" content="Dans le cadre d&#39;un vaste programme de transformation de son système d&#39;information, la DSI de Cultura renforce ses équipes. Au sein de la Direction des Systèmes d’Information de Cultura, les équipes IT conçoivent, développent et maintiennent les applicatifs stratégiques qui soutiennent les processus métiers et le fonctionnement du système d’information. Dans un environnement retail en forte évolution, les applicatifs qui supportent les catalogues produits, les stocks, la gestion commerciale et les services digitaux sont des actifs critiques, nécessitant robustesse, fiabilité et performance. En tant que développeur/développeuse, vous aurez pour mission concevoir, développer, tester unitairement et déployer, sous la responsabilité du tech lead. En tant que membre de l’équipe de développement, vous garantirez la qualité, la performance et de la robustesse des solutions développées sur l’ensemble des applicatifs de votre périmètre. Vous contribuerez à la traduction des besoins métiers en solutions techniques durables et maintenables, tout en tenant compte des contraintes existantes (legacy, intégration, exploitation). Garant du bon fonctionnement de vos développements en production, vous assurerez également le maintien en condition opérationnelle, en participant à la maintenance corrective et au support des utilisateurs. Vous pourrez participer à l’analyse et la résolution d’incidents et à l’amélioration continue des applications. Au sein du domaine SI WEB, vous serez intégré à l’équipe technique en charge du frontend e-commerce incluant la gestion du catalogue, du moteur de recherche et de la commande. Vous collaborerez étroitement avec les équipes backend en charge de la gestion des données et des commandes et les experts fonctionnels en charge de la conception et de la recette. Vous travaillerez de concert avec les chefs de projet et responsable de RUN pour garantir le bon fonctionnement de l’application au quotidien ainsi que la tenue des délais et de la qualité des projets. Vous aurez enfin en charge la production de tests unitaires sur vos développements ou ceux déjà réalisés. Vos responsabilités Analyser les contraintes techniques et les besoins métiers pour proposer des solutions robustes et adaptées, scalables, performantes, maintenables et pérennes. Estimer, concevoir et développer les composants des applicatifs. Rédiger les spécifications techniques Maintenir/améliorer la qualité du code et le respect des bonnes pratiques (testabilité, sécurité, performance, maintenabilité, documentation). Participer aux revues de code et accompagner l’équipe dans la montée en compétences technique. Appliquer les standards de développement et de qualité au sein de l’équipe. Participer à l’amélioration continue des pratiques de développement et à la mise en place de la CI/CD, réaliser les mises en production et contribuer à fiabiliser l’exploitation. Garantir le maintien en condition opérationnelle des applicatifs : contribution à l’analyse des incidents, amélioration de la supervision, de l’alerting et des processus de résolution. Contribuer à la veille technologique de l’équipe et anticiper les besoins futurs du périmètre Profil recherché Une expérience de 5 ans dans un contexte de développement professionnel (ESN, éditeur, …) est souhaitée, idéalement dans l’e-commerce. Environnement technique : React, Javascript, Typescript, CSS, Java Expérience du développement dans un contexte CMS fortement souhaitée. Un bon niveau d’anglais serait un plus pour interagir au quotidien avec l’éditeur, de même qu’une expérience sur le développement mobile. Poste à pourvoir à Mérignac (33) Poste cadre au forfait 213 jours Rémunération et avantages Ta rémunération est constituée d’un salaire fixe sur 12 mois (selon profil). A cela peut s’ajouter une partie variable comprenant : - Une prime d’intéressement trimestrielle, - Une prime de participation annuelle. La possibilité de télétravailler 2 jours par semaine. Des avantages comme des tickets restaurant, des remises sur tes achats en magasin et de l’emprunt de produits. De participer à des évènements culturels organisés en interne tout au long de l’année. Pour plus de détails, rendez-vous sur : https://recrutement.cultura.com/ Ce poste peut faire l&#39;objet d&#39;aménagements spécifiques en cas de handicap. Contrat : CDI (Temps plein) Temps de travail : 35 Magasins : MERIGNAC SIEGE SOCIAL (FR-33) Rémunération (brute annuelle) à partir de : 36000€ Bienvenue et merci pour l&#39;intérêt que tu portes à Cultura ! Cultura propose de nombreuses offres à pourvoir. Notre volonté est d&#39;embaucher des personnes passionnées et talentueuses. Une fois que tu auras eu l&#39;occasion d&#39;explorer l&#39;ensemble de nos opportunités, postule et suis directement la progression de ton processus de recrutement en ligne.">

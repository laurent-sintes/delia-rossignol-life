    <h2 class="m-0 fw-normal">Discover <strong>our offers</strong></h2>
    <p class="welcome m-0">
        All of the positions currently being recruited at Caudalie can be found here, in France and around the world.    </p>

        <a href="https://caudalie.career/apply" class="button reverse" id="show-form-button">

    <h3>Filters</h3>
<form method="post" action="#" class="ui form" id="offers-filters" data-ajax="https://caudalie.career:443/home/ajax_filter_offers">
    <div class="fields">
        <div class="field" style="flex-grow: 1; width: 0">
            <div class="field"><div class="form-group"><label class="control-label hidden" for="offerFilter[profession]"></label><div class="col-xs-12"><select data-form-required="true" name="offerFilter[profession]" id="professions-filter" class="form-control"><option value="">Professions</option><option value="42">Architecture / Merchandising</option><option value="32">Artistic Direction</option><option value="15">Commerce / Sales</option><option value="34">Communication</option><option value="35">Digital</option><option value="22">Finance</option><option value="26">Human Resources</option><option value="29">Information Technology / Information System</option><option value="43">Legal / Regulatory</option><option value="21">Logistics</option><option value="17">Marketing</option><option value="3">Operations</option><option value="2">Others</option><option value="19">Purchasing</option><option value="37">R&amp;D</option><option value="40">Retail Boutiques &amp; Spa</option><option value="20">Sales Administration / Customer Service</option><option value="1">Training</option></select></div></div></div>        </div>
        <div class="field" style="flex-grow: 1; width: 0">
            <div class="field"><div class="form-group"><label class="control-label hidden" for="offerFilter[contract_type]"></label><div class="col-xs-12"><select data-form-required="true" name="offerFilter[contract_type]" id="contracts-types-filter" class="form-control"><option value="">Contract type</option><option value="2">Fixed-term contract</option><option value="1">Indefinite-term contract</option><option value="3">Internship</option></select></div></div></div>        </div>
        <div class="field" style="flex-grow: 1; width: 0">
            <div class="field"><div class="form-group"><label class="control-label hidden" for="offerFilter[location]"></label><div class="col-xs-12"><select data-form-required="true" name="offerFilter[location]" id="locations-filter" class="form-control"><option value="">Country/City</option><option value="1">Americas</option><option value="2">Asia / Pacific</option><option value="3">Europe (except France)</option><option value="4">France</option></select></div></div></div>        </div>
        <div class="action field hide">
            <button type="button">
                <i class="fa-light fa-trash-can"></i>
            </button>
        </div>
    </div>
</form>

    <h3 data-count="0">Job offers</h3>
    <div id="offers-container" class="ui items segment basic"></div>
</section>

<script type="text/html" id="template-offer-list">
    {{#each offers}}
    <div class="item offer {{#ifCond @index '>=' 5}}hide{{/ifCond}}">
        <div class="content">
            {{#if is_new }}
            <div class="ui ribbon label">New</div>
            {{/if}}
            <div class="ui middle aligned four column centered grid">
                <div class="row">
                    <div class="column twelve wide computer sixteen wide tablet">
                        {{#ifCond slug '&&' title}}
                            <a href="https://caudalie.career/apply/offer/{{slug}}" title="Discover job offer" class="header">
                                {{ title }}
                            </a>
                        {{/ifCond}}
                        <br />
                        {{#ifCond contract_type '||' location }}
                        <div class="ui list horizontal mt-10">
                            <div class="item">
                                <div class="content">
                                    <i class="fal fa-file-contract"></i>&nbsp;{{ contract_type }}
                                </div>
                            </div>
                            <div class="item">
                                <div class="content">
                                    <i class="fas fa-globe-europe"></i>&nbsp;{{ location }}
                                </div>
                            </div>
                        </div>
                        {{/ifCond}}
                    </div>
                    {{#ifCond slug '&&' title}}
                        <div class="action column middle four wide computer sixteen wide tablet aligned">
                            <a href="https://caudalie.career/apply/offer/{{slug}}" class="button centered wide">
                                Discover                            </a>
                        </div>
                    {{/ifCond}}
                </div>
            </div>
        </div>
    </div>
    {{/each}}
    {{#ifCond offers.length '>' 5}}
        <p class="centered">
            <button type="button" class="button reverse large bold" id="see-more-offers">View more offers</button>
        </p>
    {{/ifCond}}
</script>

<script type="text/html" id="template-no-offer-with-criteria">
    <div class="ui message caudalie">
        <div class="header">No job offer match your criteria</div>
        <p>
            Unfortunately, there is currently no opportunities matching your search.        </p>
        {{#if offers }}
        <p class="mt-20">
            One of the following offer may interest you:            <ul>
            {{#each offers}}
                {{#ifCond slug '&&' title}}
                    <li>
                        <a href="https://caudalie.career/apply/offer/{{slug}}" title="Discover job offer" class="header">
                            {{ title }}
                        </a>
                    </li>
                {{/ifCond}}
            {{/each}}
            </ul>
        </p>
        {{/if}}
    </div>
    <br />
    <br />
</script>

<script type="text/html" id="template-no-offer">
    <div class="ui message caudalie">
        <div class="header">No job offer available</div>
        <p>
            There are no job opportunities available at the moment        </p>
    </div>
    <br />
    <br />
</script>

<script type="text/html" id="template-offer-error">
    <div class="ui message error">
        <div class="header">Loading error</div>
        <p>
            Unable to display offers. Please try again later        </p>
    </div>
    <br />
    <br />
</script>
